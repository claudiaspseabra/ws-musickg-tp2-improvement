{% extends 'music_graph/base.html' %}

{% block title %}Statistics - MusicKG{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto px-6 py-10">
    <h1 class="text-4xl font-extrabold text-text-primary mb-8">📊 Graph Insights</h1>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">

        <div class="bg-bg-card p-6 rounded-xl border border-border-col">
            <h2 class="text-xl font-bold mb-6 text-text-primary">Tracks by Genre (Top 10)</h2>
            <div class="relative h-72 w-full">
                <canvas id="genresChart"></canvas>
            </div>
        </div>

        <div class="bg-bg-card p-6 rounded-xl border border-border-col">
            <h2 class="text-xl font-bold mb-6 text-text-primary">Average Energy by Genre</h2>
            <div class="relative h-72 w-full">
                <canvas id="energyChart"></canvas>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    Chart.defaults.color = '#b3b3b3';
    Chart.defaults.borderColor = '#2a2a2a';

    const g1Labels = {{ g1_labels|safe }};
    const g1Data = {{ g1_data|safe }};

    const g2Labels = {{ g2_labels|safe }};
    const g2Data = {{ g2_data|safe }};

    // CHART 1: Bar Chart (Tracks per Genre)
    new Chart(document.getElementById('genresChart'), {
        type: 'bar',
        data: {
            labels: g1Labels,
            datasets: [{
                label: 'Number of Tracks',
                data: g1Data,
                backgroundColor: '#1db954',
                borderRadius: 4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } }
        }
    });

    // CHART 2: Polar Area Chart (Average Energy per Genre)
    new Chart(document.getElementById('energyChart'), {
        type: 'polarArea',
        data: {
            labels: g2Labels,
            datasets: [{
                label: 'Energy Level',
                data: g2Data,
                backgroundColor: [
                    'rgba(30, 215, 96, 0.7)',
                    'rgba(255, 99, 132, 0.7)',
                    'rgba(54, 162, 235, 0.7)',
                    'rgba(255, 206, 86, 0.7)',
                    'rgba(153, 102, 255, 0.7)'
                ],
                borderWidth: 1,
                borderColor: '#121212'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                r: { ticks: { display: false } }
            }
        }
    });
</script>
{% endblock %}
